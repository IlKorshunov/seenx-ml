[tool.pyright]
venvPath = "."
venv = "venv"

[tool.ruff]
line-length = 180
target-version = "py311"

[tool.ruff.lint]
select = ["E", "W", "F", "I", "UP", "B", "SIM", "RUF"]
ignore = [
    "E402",
    "E501",
    "E701",
    "E702",
    "E722",
    "E731",
    "E741",
    "F403",
    "F405",
    "F841",
    "I001",
    "W291",
    "W293",
    "UP031",
    "B006",
    "B007",
    "B008",
    "B028",
    "B904",
    "SIM101",
    "SIM102",
    "SIM105",
    "SIM108",
    "SIM110",
    "SIM113",
    "SIM115",
    "SIM201",
    "UP028",
    "RUF001",
    "RUF002",
    "RUF003",
    "RUF005",
    "RUF007",
    "RUF013",
    "RUF046",
    "RUF059",
    "RUF100",
]

[tool.ruff.lint.per-file-ignores]
"train/train_*.py" = ["E402"]
"train/visualize_*.py" = ["E402"]
"train/loo_report.py" = ["E402"]

[tool.ruff.lint.isort]
known-first-party = ["src"]
force-single-line = false
lines-after-imports = 2

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = true
exclude = ["src/baseline.py"]
