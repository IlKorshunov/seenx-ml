[tool.pyright]
venvPath = "."
venv = "venv"
pythonVersion = "3.10"
typeCheckingMode = "basic"
reportMissingTypeStubs = false

[tool.ruff]
line-length = 120
target-version = "py310"
extend-exclude = ["src/baseline.py"]

[tool.ruff.lint]
select = ["E", "W", "F", "I", "UP", "B", "SIM", "RUF"]
ignore = ["E402", "E501", "E741"]

[tool.ruff.lint.per-file-ignores]
"train/*.py" = ["E402"]
"tests/*.py" = ["S101", "F841"]
"__init__.py" = ["F401"]

[tool.ruff.lint.isort]
known-first-party = ["src"]
lines-after-imports = 2

[tool.ruff.format]
quote-style = "double"
indent-style = "space"